<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="./echarts.min.js"></script>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --panel: #ffffff;
      --panel-2: #f1f5f9;
      --text: #172033;
      --muted: #64748b;
      --line: rgba(15, 23, 42, .12);
      --accent: #0f766e;
      --accent-2: #2563eb;
      --warn: #d97706;
      --danger: #dc2626;
      --ok: #16a34a;
      --shadow: 0 10px 30px rgba(15, 23, 42, .08);
    }

    body.dark {
      --bg: #0f172a;
      --panel: #111c2f;
      --panel-2: #18243a;
      --text: #e5eefb;
      --muted: #9fb1ca;
      --line: rgba(226, 232, 240, .14);
      --accent: #2dd4bf;
      --accent-2: #60a5fa;
      --warn: #f59e0b;
      --danger: #f87171;
      --ok: #4ade80;
      --shadow: 0 14px 34px rgba(0, 0, 0, .28);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    .shell {
      height: 100vh;
      min-height: 0;
      padding: 10px 10px 12px;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, .12), transparent 36%),
        linear-gradient(315deg, rgba(161, 98, 7, .12), transparent 40%),
        var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
      flex: 0 0 auto;
    }

    .title {
      font-size: 21px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
      max-width: 560px;
    }

    .toolbar {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .chip {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      border-radius: 999px;
      min-height: 32px;
      padding: 0 12px;
      font: inherit;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 3px 12px rgba(15, 23, 42, .04);
    }

    .chip.active {
      background: var(--accent);
      color: #fff;
      border-color: transparent;
    }

    .range-control {
      display: flex;
      align-items: flex-end;
      flex-direction: column;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .range-label {
      font-weight: 600;
      color: var(--muted);
    }

    .range-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 6px;
      max-width: 680px;
    }

    .range-chip {
      height: 32px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      box-shadow: 0 3px 12px rgba(15, 23, 42, .04);
      cursor: pointer;
    }

    .range-chip.active {
      background: var(--accent-2);
      color: #fff;
      border-color: transparent;
    }

    .custom-range {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .custom-range[hidden] {
      display: none;
    }

    .custom-range label {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .custom-range input {
      height: 32px;
      min-width: 190px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      font-size: 12px;
      padding: 0 8px;
    }

    .dashboard-tooltip {
      z-index: 999999 !important;
      max-width: min(380px, calc(100vw - 24px));
      white-space: normal;
      word-break: break-word;
      overflow-wrap: anywhere;
      line-height: 1.45;
      box-shadow: 0 14px 34px rgba(15, 23, 42, .2) !important;
    }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
      flex: 0 0 auto;
    }

    .metric {
      min-height: 68px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 88%, transparent);
      box-shadow: var(--shadow);
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
    }

    .metric-value {
      margin-top: 6px;
      font-size: 23px;
      font-weight: 700;
      line-height: 1.05;
    }

    .metric-note {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      white-space: normal;
      overflow-wrap: anywhere;
      line-height: 1.35;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(400px, 1fr);
      gap: 8px;
      min-height: 0;
      flex: 1 1 auto;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: color-mix(in srgb, var(--panel) 92%, transparent);
      box-shadow: var(--shadow);
      overflow: hidden;
      min-width: 0;
      min-height: 0;
    }

    .panel.wide { grid-column: span 1; }

    .chart {
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .mode-temperature .panel:not(.temperature),
    .mode-fans .panel:not(.fans),
    .mode-power .panel:not(.power),
    .mode-status .panel:not(.status) {
      display: none;
    }

    .mode-temperature .grid,
    .mode-fans .grid,
    .mode-power .grid,
    .mode-status .grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-template-rows: repeat(2, minmax(0, 1fr));
      grid-auto-rows: minmax(0, 1fr);
    }

    .mode-temperature .panel,
    .mode-fans .panel,
    .mode-power .panel,
    .mode-status .panel {
      grid-column: span 1;
    }

    @media (max-width: 980px) {
      body { overflow-y: auto; }
      .shell { height: auto; min-height: 100vh; overflow: visible; }
      .topbar { flex-direction: column; }
      .toolbar { align-items: flex-start; }
      .chips { justify-content: flex-start; }
      .range-control { align-items: flex-start; }
      .range-buttons, .custom-range { justify-content: flex-start; }
      .metric-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid { grid-template-columns: 1fr; grid-template-rows: repeat(6, minmax(420px, auto)); grid-auto-rows: minmax(420px, auto); }
      .panel.wide { grid-column: span 1; }
    }
  </style>
</head>
<body>
  <main class="shell" id="shell">
    <section class="topbar">
      <div>
        <div class="title" id="title"></div>
        <div class="subtitle" id="subtitle"></div>
      </div>
      <div class="toolbar">
        <div class="chips" id="chips"></div>
        <div class="range-control" id="rangeControl">
          <span class="range-label" id="rangeLabel"></span>
          <div class="range-buttons" id="rangeButtons"></div>
          <div class="custom-range" id="customRange" hidden>
            <label><span id="customStartLabel"></span><input id="customStart" type="datetime-local" /></label>
            <label><span id="customEndLabel"></span><input id="customEnd" type="datetime-local" /></label>
          </div>
        </div>
      </div>
    </section>

    <section class="metric-strip" id="metrics"></section>

    <section class="grid" id="grid">
      <article class="panel status wide"><div class="chart" id="trend"></div></article>
      <article class="panel status"><div class="chart" id="overall"></div></article>
      <article class="panel temperature"><div class="chart" id="temperature"></div></article>
      <article class="panel fans"><div class="chart" id="fans"></div></article>
      <article class="panel power"><div class="chart" id="power"></div></article>
      <article class="panel status"><div class="chart" id="types"></div></article>
    </section>
  </main>

  <script>
    const chartIds = ["trend", "overall", "temperature", "fans", "power", "types"];
    const charts = new Map();
    const rangeDurations = {
      "6h": 6 * 60 * 60 * 1000,
      "1d": 24 * 60 * 60 * 1000,
      "3d": 3 * 24 * 60 * 60 * 1000,
      "7d": 7 * 24 * 60 * 60 * 1000
    };
    let currentView = "all";
    let selectedRange = "6h";
    let customRangeStart = "";
    let customRangeEnd = "";
    let lastPayload = null;

    function initCharts() {
      chartIds.forEach((id) => {
        const element = document.getElementById(id);
        charts.set(id, echarts.init(element, null, { renderer: "canvas" }));
      });
      window.addEventListener("resize", resizeCharts);
    }

    function resizeCharts() {
      charts.forEach((chart) => chart.resize());
    }

    function text(value) {
      return value === null || value === undefined ? "" : String(value);
    }

    function number(value, digits) {
      if (value === null || value === undefined || Number.isNaN(Number(value))) {
        return "--";
      }
      return Number(value).toFixed(digits);
    }

    function colorSet() {
      return [
        "#0f766e",
        "#2563eb",
        "#a16207",
        "#7c3aed",
        "#dc2626",
        "#16a34a",
        "#0891b2",
        "#db2777"
      ];
    }

    function axisColor() {
      return getComputedStyle(document.body).getPropertyValue("--muted").trim();
    }

    function textColor() {
      return getComputedStyle(document.body).getPropertyValue("--text").trim();
    }

    function splitColor() {
      return getComputedStyle(document.body).getPropertyValue("--line").trim();
    }

    function render(payload) {
      lastPayload = payload;
      document.body.classList.toggle("dark", payload.theme === "Dark");
      document.documentElement.lang = payload.language || "und";
      document.body.dataset.dpiScale = dpiScale().toFixed(2);
      document.getElementById("title").textContent = payload.labels.title;
      document.getElementById("subtitle").textContent = payload.labels.subtitle;
      renderChips(payload.labels);
      renderRangeControls(payload);
      const rangePayload = buildRangePayload(payload);
      renderMetrics(rangePayload);
      renderCharts(rangePayload);
      setView(currentView);
      requestAnimationFrame(resizeCharts);
    }

    function renderChips(labels) {
      const entries = [
        ["all", labels.viewAll],
        ["temperature", labels.viewTemperature],
        ["fans", labels.viewFans],
        ["power", labels.viewPower],
        ["status", labels.viewStatus]
      ];
      const host = document.getElementById("chips");
      host.innerHTML = "";
      entries.forEach(([view, label]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "chip" + (view === currentView ? " active" : "");
        button.textContent = label;
        button.addEventListener("click", () => setView(view));
        host.appendChild(button);
      });
    }

    function setView(view) {
      currentView = view;
      const shell = document.getElementById("shell");
      shell.className = "shell" + (view === "all" ? "" : " mode-" + view);
      document.querySelectorAll(".chip").forEach((button, index) => {
        const views = ["all", "temperature", "fans", "power", "status"];
        button.classList.toggle("active", views[index] === view);
      });
      requestAnimationFrame(resizeCharts);
    }

    function renderRangeControls(payload) {
      const labels = payload.labels;
      const options = [
        ["live", labels.rangeLive],
        ["6h", labels.range6Hours],
        ["1d", labels.range1Day],
        ["3d", labels.range3Days],
        ["7d", labels.range7Days],
        ["custom", labels.rangeCustom]
      ];
      document.getElementById("rangeLabel").textContent = labels.historyRange;
      const buttons = document.getElementById("rangeButtons");
      buttons.innerHTML = "";
      options.forEach(([range, label]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "range-chip" + (range === selectedRange ? " active" : "");
        button.textContent = label;
        button.addEventListener("click", () => {
          selectedRange = range;
          if (range === "custom") {
            initializeCustomRange(payload);
          }
          render(payload);
        });
        buttons.appendChild(button);
      });

      const customPanel = document.getElementById("customRange");
      customPanel.hidden = selectedRange !== "custom";
      document.getElementById("customStartLabel").textContent = labels.rangeStart;
      document.getElementById("customEndLabel").textContent = labels.rangeEnd;
      const startInput = document.getElementById("customStart");
      const endInput = document.getElementById("customEnd");
      startInput.value = customRangeStart;
      endInput.value = customRangeEnd;
      startInput.onchange = () => {
        customRangeStart = startInput.value;
        if (lastPayload) {
          render(lastPayload);
        }
      };
      endInput.onchange = () => {
        customRangeEnd = endInput.value;
        if (lastPayload) {
          render(lastPayload);
        }
      };
    }

    function renderMetrics(payload) {
      const s = payload.summary || emptySummary();
      const labels = payload.labels;
      const entries = [
        [labels.maxCpuTemp, number(s.maxTemperature, 1) + " " + labels.tempUnit, labels.temperatureSensors + ": " + s.temperatureCount],
        [labels.averageFanRpm, number(s.averageFanRpm, 0) + " " + labels.fanUnit, labels.fanRange + ": " + number(s.minFanRpm, 0) + " - " + number(s.maxFanRpm, 0)],
        [labels.performancePeak, number(s.maxPerformance, 1) + " %", labels.cpuUsage + " " + number(s.cpuUsage, 0) + "% / " + labels.memoryUsage + " " + number(s.memUsage, 0) + "%"],
        [labels.electricalReadings, s.electricalCount, number(s.powerWatts, 0) + " " + labels.powerUnit + " · " + number(s.totalCurrent, 1) + " " + labels.currentUnit],
        [labels.healthState, s.okCount + " / " + s.sensorCount, labels.warningCount + ": " + s.warningCount]
      ];
      const host = document.getElementById("metrics");
      host.innerHTML = entries.map(([label, value, note]) =>
        `<div class="metric"><div class="metric-label">${escapeHtml(label)}</div><div class="metric-value">${escapeHtml(value)}</div><div class="metric-note">${escapeHtml(note)}</div></div>`
      ).join("");
    }

    function renderCharts(payload) {
      renderTrend(payload);
      renderOverall(payload);
      renderTemperatureHistory(payload);
      renderFansHistory(payload);
      renderPowerHistory(payload);
      renderTypes(payload);
    }

    function renderTrend(payload) {
      const labels = payload.labels;
      const history = chartHistory(payload);
      if (history.length === 0) {
        renderEmptyChart("trend", labels.trendTitle, labels.trendSubtitle, labels.noHistoryData);
        return;
      }

      const series = [
        summaryTimeLine(labels.maxCpuTemp, history, "maxTemperature", 0),
        summaryTimeLine(labels.averageFanRpm, history, "averageFanRpm", 1),
        summaryTimeLine(labels.cpuUsage, history, "cpuUsage", 0),
        summaryTimeLine(labels.memoryUsage, history, "memUsage", 0),
        summaryTimeLine(labels.ioUsage, history, "ioUsage", 0),
        summaryTimeLine(labels.systemUsage, history, "sysUsage", 0),
        summaryTimeLine(labels.typePower, history, "powerWatts", 2)
      ];
      const layout = chartLayout("trend", series, { right: 112, left: 54 });
      charts.get("trend").setOption({
        color: colorSet(),
        title: chartTitle(labels.trendTitle, labels.trendSubtitle, payload.rangeLabel),
        tooltip: dashboardTooltip({ trigger: "axis" }),
        legend: chartLegend(layout.legendTop),
        grid: chartGrid(layout.gridTop, layout.right, layout.bottom, layout.left),
        dataZoom: chartDataZoom(layout),
        xAxis: { type: "time", axisLabel: { color: axisColor() }, axisLine: { lineStyle: { color: splitColor() } } },
        yAxis: [
          { type: "value", name: labels.tempPercentUnit, axisLabel: { color: axisColor() }, splitLine: { lineStyle: { color: splitColor() } } },
          { type: "value", name: labels.fanUnit, axisLabel: { color: axisColor() }, splitLine: { show: false } },
          { type: "value", name: labels.powerUnit, offset: 46, axisLabel: { color: axisColor() }, splitLine: { show: false } }
        ],
        series
      }, true);
    }

    function renderOverall(payload) {
      const labels = payload.labels;
      const history = chartHistory(payload);
      if (history.length === 0) {
        renderEmptyChart("overall", labels.overallTitle, labels.overallSubtitle, labels.noHistoryData);
        return;
      }

      const s = payload.summary || emptySummary();
      const peak = peakSummary(history);
      const latest = history[history.length - 1]?.summary || s;
      charts.get("overall").setOption({
        color: ["#0f766e", "#2563eb", "#d97706", "#16a34a"],
        title: chartTitle(labels.overallTitle, labels.overallSubtitle, payload.rangeLabel),
        tooltip: dashboardTooltip({
          formatter: () => [
            `${labels.maxCpuTemp}: ${number(s.maxTemperature, 1)} ${labels.tempUnit}`,
            `${labels.averageFanRpm}: ${number(s.averageFanRpm, 0)} ${labels.fanUnit}`,
            `${labels.performancePeak}: ${number(s.maxPerformance, 1)} %`,
            `${labels.powerTitle}: ${number(s.powerWatts, 0)} ${labels.powerUnit}`,
            `${labels.typeVoltage}: ${number(s.averageVoltage, 1)} ${labels.voltageUnit}`,
            `${labels.typeCurrent}: ${number(s.totalCurrent, 1)} ${labels.currentUnit}`,
            `${labels.healthState}: ${s.okCount} / ${s.sensorCount}`,
            `${labels.hardwareTypes}: ${s.sensorCount}`
          ].join("<br/>")
        }),
        legend: { bottom: 8, textStyle: { color: axisColor() } },
        radar: {
          center: ["50%", "53%"],
          radius: "58%",
          splitLine: { lineStyle: { color: splitColor() } },
          splitArea: { areaStyle: { color: ["rgba(15,118,110,.05)", "rgba(37,99,235,.05)"] } },
          axisName: { color: axisColor() },
          indicator: [
            { name: labels.maxCpuTemp, max: 100 },
            { name: labels.averageFanRpm, max: 100 },
            { name: labels.performancePeak, max: 100 },
            { name: labels.typePower, max: 100 },
            { name: labels.typeVoltage, max: 100 },
            { name: labels.typeCurrent, max: 100 },
            { name: labels.healthState, max: 100 },
            { name: labels.hardwareTypes, max: 100 }
          ]
        },
        series: [{
          type: "radar",
          areaStyle: { opacity: .22 },
          lineStyle: { width: 3 },
          symbolSize: 5,
          data: [
            { name: labels.rangeAverage, value: radarValues(s) },
            { name: labels.rangePeak, value: radarValues(peak) },
            { name: labels.rangeLatest, value: radarValues(latest) }
          ]
        }]
      }, true);
    }

    function renderTemperatureHistory(payload) {
      const labels = payload.labels;
      const history = chartHistory(payload);
      const series = buildSensorTimeSeries(history, (row) => row.current?.temperatures || [], 0);
      if (series.length === 0) {
        renderEmptyChart("temperature", labels.temperatureTitle, labels.temperatureSubtitle, labels.noHistoryData);
        return;
      }

      const layout = chartLayout("temperature", series);
      charts.get("temperature").setOption({
        color: colorSet(),
        title: chartTitle(labels.temperatureTitle, labels.temperatureSubtitle, payload.rangeLabel),
        tooltip: dashboardTooltip({ trigger: "axis" }),
        legend: chartLegend(layout.legendTop),
        grid: chartGrid(layout.gridTop, layout.right, layout.bottom, layout.left),
        dataZoom: chartDataZoom(layout),
        xAxis: { type: "time", axisLabel: { color: axisColor() }, axisLine: { lineStyle: { color: splitColor() } } },
        yAxis: { type: "value", name: labels.tempUnit, axisLabel: { color: axisColor() }, splitLine: { lineStyle: { color: splitColor() } } },
        series
      }, true);
    }

    function renderFansHistory(payload) {
      const labels = payload.labels;
      const history = chartHistory(payload);
      const series = buildSensorTimeSeries(history, (row) => row.current?.fans || [], 0);
      if (series.length === 0) {
        renderEmptyChart("fans", labels.fanTitle, labels.fanSubtitle, labels.noHistoryData);
        return;
      }

      const layout = chartLayout("fans", series);
      charts.get("fans").setOption({
        color: colorSet(),
        title: chartTitle(labels.fanTitle, labels.fanSubtitle, payload.rangeLabel),
        tooltip: dashboardTooltip({ trigger: "axis" }),
        legend: chartLegend(layout.legendTop),
        grid: chartGrid(layout.gridTop, layout.right, layout.bottom, layout.left),
        dataZoom: chartDataZoom(layout),
        xAxis: { type: "time", axisLabel: { color: axisColor() }, axisLine: { lineStyle: { color: splitColor() } } },
        yAxis: { type: "value", name: labels.fanUnit, axisLabel: { color: axisColor() }, splitLine: { lineStyle: { color: splitColor() } } },
        series
      }, true);
    }

    function renderPowerHistory(payload) {
      const labels = payload.labels;
      const history = chartHistory(payload);
      const series = [
        ...buildSensorTimeSeries(history, (row) => row.current?.performance || [], 0),
        ...buildSensorTimeSeries(history, (row) => (row.current?.electrical || []).filter((point) => point.type === labels.typePower), 1),
        ...buildSensorTimeSeries(history, (row) => (row.current?.electrical || []).filter((point) => point.type === labels.typeVoltage), 2),
        ...buildSensorTimeSeries(history, (row) => (row.current?.electrical || []).filter((point) => point.type === labels.typeCurrent), 3)
      ];
      if (series.length === 0) {
        renderEmptyChart("power", labels.powerTitle, labels.powerSubtitle, labels.noHistoryData);
        return;
      }

      const layout = chartLayout("power", series, { right: 144, left: 58 });
      charts.get("power").setOption({
        color: ["#7c3aed", "#a16207", "#0891b2", "#db2777"],
        title: chartTitle(labels.powerTitle, labels.powerSubtitle, payload.rangeLabel),
        tooltip: dashboardTooltip({ trigger: "axis" }),
        legend: chartLegend(layout.legendTop),
        grid: chartGrid(layout.gridTop, layout.right, layout.bottom, layout.left),
        dataZoom: chartDataZoom(layout),
        xAxis: { type: "time", axisLabel: { color: axisColor() }, axisLine: { lineStyle: { color: splitColor() } } },
        yAxis: [
          { type: "value", name: "%", axisLabel: { color: axisColor() }, splitLine: { lineStyle: { color: splitColor() } } },
          { type: "value", name: labels.powerUnit, axisLabel: { color: axisColor() }, splitLine: { show: false } },
          { type: "value", name: labels.voltageUnit, offset: 42, axisLabel: { color: axisColor() }, splitLine: { show: false } },
          { type: "value", name: labels.currentUnit, offset: 84, axisLabel: { color: axisColor() }, splitLine: { show: false } }
        ],
        series
      }, true);
    }

    function renderTypes(payload) {
      const labels = payload.labels;
      const history = chartHistory(payload);
      if (history.length === 0) {
        renderEmptyChart("types", labels.typeTitle, labels.typeSubtitle, labels.noHistoryData);
        return;
      }

      const series = [
        summaryTimeLine(labels.statusOk, history, "okCount", 0),
        summaryTimeLine(labels.statusWarning, history, "warningCount", 0),
        summaryTimeLine(labels.hardwareTypes, history, "sensorCount", 0)
      ];
      const layout = chartLayout("types", series);
      charts.get("types").setOption({
        color: colorSet(),
        title: chartTitle(labels.typeTitle, labels.typeSubtitle, payload.rangeLabel),
        tooltip: dashboardTooltip({ trigger: "axis" }),
        legend: chartLegend(layout.legendTop),
        grid: chartGrid(layout.gridTop, layout.right, layout.bottom, layout.left),
        dataZoom: chartDataZoom(layout),
        xAxis: { type: "time", axisLabel: { color: axisColor() }, axisLine: { lineStyle: { color: splitColor() } } },
        yAxis: { type: "value", name: labels.countUnit, axisLabel: { color: axisColor() }, splitLine: { lineStyle: { color: splitColor() } } },
        series
      }, true);
    }

    function chartTitle(title, subtitle, rangeLabel) {
      return {
        text: title,
        subtext: [subtitle, rangeLabel].filter(Boolean).join("\n"),
        left: 16,
        right: 16,
        top: 12,
        textStyle: { color: textColor(), fontSize: 15, fontWeight: 700 },
        subtextStyle: { color: axisColor(), fontSize: 11, lineHeight: 17 },
        itemGap: 7
      };
    }

    function chartLegend(top) {
      return {
        type: "plain",
        top,
        left: 16,
        right: 16,
        itemWidth: 12,
        itemHeight: 8,
        itemGap: 12,
        textStyle: { color: axisColor(), fontSize: scaledFont(11), lineHeight: scaledLineHeight(16) },
        selector: false
      };
    }

    function chartLayout(chartId, series, options) {
      const settings = Object.assign({
        left: 58,
        right: 42,
        bottom: 96,
        zoomBottom: 28,
        zoomHeight: 22,
        minPlotHeight: 132
      }, options || {});
      const element = document.getElementById(chartId);
      const width = element ? element.getBoundingClientRect().width : 520;
      const titleBlockBottom = Math.ceil(12 + scaledLineHeight(18) + 7 + (2 * scaledLineHeight(17)));
      const legendTop = titleBlockBottom + scaledLineHeight(12);
      const names = (series || []).map((item) => item.name || "").filter(Boolean);
      const legendRows = estimateLegendRows(names, width - 32);
      const legendHeight = Math.max(scaledLineHeight(18), legendRows * scaledLineHeight(19));
      const legendToPlotGap = scaledLineHeight(18);
      const preferredGridTop = Math.ceil(legendTop + legendHeight + legendToPlotGap);
      const bottom = Math.max(settings.bottom, settings.zoomBottom + settings.zoomHeight + scaledLineHeight(38));
      return {
        legendTop,
        gridTop: preferredGridTop,
        left: settings.left,
        right: settings.right,
        bottom,
        zoomBottom: settings.zoomBottom,
        zoomHeight: settings.zoomHeight,
        zoomLeft: Math.max(settings.left, 92),
        zoomRight: Math.max(settings.right, 92)
      };
    }

    function chartDataZoom(layout) {
      return [
        {
          type: "inside",
          zoomOnMouseWheel: false,
          moveOnMouseWheel: false,
          moveOnMouseMove: false
        },
        {
          type: "slider",
          height: layout.zoomHeight,
          bottom: layout.zoomBottom,
          left: layout.zoomLeft,
          right: layout.zoomRight,
          labelFormatter: zoomLabelFormatter,
          textStyle: { color: axisColor(), fontSize: scaledFont(10) }
        }
      ];
    }

    function zoomLabelFormatter(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return "";
      }

      return `${pad2(date.getHours())}:${pad2(date.getMinutes())}`;
    }

    function estimateLegendRows(names, availableWidth) {
      if (!Array.isArray(names) || names.length === 0) {
        return 1;
      }

      const width = Math.max(160, Number(availableWidth) || 160);
      let rows = 1;
      let used = 0;
      names.forEach((name) => {
        const itemWidth = estimateLegendItemWidth(name);
        if (used > 0 && used + itemWidth > width) {
          rows++;
          used = 0;
        }

        used += itemWidth;
      });
      return rows;
    }

    function estimateLegendItemWidth(name) {
      const label = text(name);
      let width = 34;
      for (const char of label) {
        width += /[\u2E80-\u9FFF]/.test(char) ? 12 : 7;
      }

      return Math.ceil(width * dpiScale());
    }

    function dpiScale() {
      const ratio = Number(window.devicePixelRatio);
      if (!Number.isFinite(ratio) || ratio <= 0) {
        return 1;
      }

      return clamp(ratio, 1, 2);
    }

    function scaledFont(size) {
      return Math.ceil(size * Math.min(dpiScale(), 1.35));
    }

    function scaledLineHeight(size) {
      return Math.ceil(size * Math.min(dpiScale(), 1.35));
    }

    function chartGrid(top, right, bottom, left) {
      return {
        top,
        right,
        bottom,
        left,
        containLabel: true
      };
    }

    function smoothTimeLine(name, data, yAxisIndex) {
      return {
        name,
        type: "line",
        yAxisIndex,
        smooth: true,
        showSymbol: false,
        data,
        lineStyle: { width: 3 },
        areaStyle: { opacity: .08 }
      };
    }

    function summaryTimeLine(name, history, property, yAxisIndex) {
      return smoothTimeLine(name, history.map((row) => [row._time, numericOrNull(row.summary?.[property] ?? row[property])]), yAxisIndex);
    }

    function buildSensorTimeSeries(history, selector, yAxisIndex) {
      const seriesBySensor = new Map();
      history.forEach((row) => {
        const time = row._time;
        const points = selector(row) || [];
        points.forEach((point) => {
          const value = numericOrNull(point.value);
          if (value === null) {
            return;
          }

          const key = `${point.id || point.name || ""}|${point.name || ""}|${point.unit || ""}`;
          if (!seriesBySensor.has(key)) {
            seriesBySensor.set(key, smoothTimeLine(point.name || key, [], yAxisIndex));
          }

          seriesBySensor.get(key).data.push({
            value: [time, value],
            unit: point.unit || "",
            status: point.status || "",
            type: point.type || ""
          });
        });
      });

      return Array.from(seriesBySensor.values()).sort((left, right) => left.name.localeCompare(right.name));
    }

    function renderEmptyChart(id, title, subtitle, message) {
      charts.get(id).setOption({
        title: chartTitle(title, subtitle),
        xAxis: { show: false },
        yAxis: { show: false },
        series: [],
        graphic: {
          type: "text",
          left: "center",
          top: "middle",
          style: {
            text: message,
            fill: axisColor(),
            fontSize: 14,
            fontFamily: "Segoe UI, sans-serif"
          }
        }
      }, true);
    }

    function buildRangePayload(payload) {
      const history = normalizedHistory(payload);
      if (selectedRange === "live") {
        const latest = history.length > 0 ? history[history.length - 1] : currentHistoryPoint(payload);
        const liveHistory = latest ? [latest] : [];
        return Object.assign({}, payload, {
          summary: latest?.summary || payload.summary || emptySummary(),
          current: latest?.current || payload.current || emptyCurrent(),
          typeCounts: latest?.typeCounts || payload.typeCounts || [],
          sensorTree: latest?.sensorTree || payload.sensorTree || [],
          rangeHistory: liveHistory,
          rangeLabel: labelsRange(payload.labels, liveHistory)
        });
      }

      const filtered = filterHistoryBySelectedRange(history);
      const latest = filtered.length > 0 ? filtered[filtered.length - 1] : null;
      return Object.assign({}, payload, {
        summary: filtered.length > 0 ? aggregateSummary(filtered) : emptySummary(),
        current: latest?.current || emptyCurrent(),
        typeCounts: latest?.typeCounts || [],
        sensorTree: latest?.sensorTree || [],
        rangeHistory: filtered,
        rangeLabel: labelsRange(payload.labels, filtered)
      });
    }

    function normalizedHistory(payload) {
      const rows = Array.isArray(payload.history) ? payload.history : [];
      return rows
        .map((row) => Object.assign({}, row, { _time: historyTimestamp(row) }))
        .filter((row) => Number.isFinite(row._time))
        .sort((left, right) => left._time - right._time);
    }

    function historyTimestamp(row) {
      const unix = Number(row?.unixMilliseconds);
      if (Number.isFinite(unix) && unix > 0) {
        return unix;
      }

      const parsed = Date.parse(row?.timestamp || "");
      return Number.isFinite(parsed) ? parsed : NaN;
    }

    function filterHistoryBySelectedRange(history) {
      if (history.length === 0) {
        return [];
      }

      if (selectedRange === "custom") {
        const start = Date.parse(customRangeStart);
        const end = Date.parse(customRangeEnd);
        if (!Number.isFinite(start) || !Number.isFinite(end) || end < start) {
          return [];
        }

        return history.filter((row) => row._time >= start && row._time <= end);
      }

      const latest = history[history.length - 1]._time;
      const duration = rangeDurations[selectedRange] || rangeDurations["6h"];
      const start = latest - duration;
      return history.filter((row) => row._time >= start && row._time <= latest);
    }

    function initializeCustomRange(payload) {
      const history = normalizedHistory(payload);
      const end = history.length > 0 ? history[history.length - 1]._time : Date.now();
      const start = history.length > 0 ? history[0]._time : end - rangeDurations["6h"];
      if (!customRangeStart) {
        customRangeStart = toLocalInputValue(start);
      }
      if (!customRangeEnd) {
        customRangeEnd = toLocalInputValue(end);
      }
    }

    function currentHistoryPoint(payload) {
      if (!payload.summary || !payload.current) {
        return null;
      }

      const time = Date.now();
      return {
        id: "current",
        time: payload.summary.lastUpdated || formatDateTime(time),
        timestamp: new Date(time).toISOString(),
        unixMilliseconds: time,
        _time: time,
        summary: payload.summary,
        current: payload.current,
        typeCounts: payload.typeCounts || [],
        sensorTree: payload.sensorTree || []
      };
    }

    function labelsRange(labels, history) {
      if (!history || history.length === 0) {
        return labels.noHistoryData;
      }

      const start = history[0]._time;
      const end = history[history.length - 1]._time;
      return start === end ? formatDateTime(end) : `${formatDateTime(start)} - ${formatDateTime(end)}`;
    }

    function chartHistory(payload) {
      return Array.isArray(payload.rangeHistory) ? payload.rangeHistory : [];
    }

    function aggregateSummary(history) {
      const latest = history[history.length - 1]?.summary || {};
      return {
        sensorCount: latest.sensorCount || 0,
        temperatureCount: latest.temperatureCount || 0,
        fanCount: latest.fanCount || 0,
        performanceCount: latest.performanceCount || 0,
        electricalCount: latest.electricalCount || 0,
        maxTemperature: maxSummaryValue(history, "maxTemperature"),
        averageFanRpm: averageSummaryValue(history, "averageFanRpm"),
        minFanRpm: minSummaryValue(history, "minFanRpm"),
        maxFanRpm: maxSummaryValue(history, "maxFanRpm"),
        maxPerformance: maxSummaryValue(history, "maxPerformance"),
        averagePerformance: averageSummaryValue(history, "averagePerformance"),
        powerWatts: averageSummaryValue(history, "powerWatts"),
        voltageCount: latest.voltageCount || 0,
        averageVoltage: averageSummaryValue(history, "averageVoltage"),
        currentCount: latest.currentCount || 0,
        totalCurrent: averageSummaryValue(history, "totalCurrent"),
        cpuUsage: averageSummaryValue(history, "cpuUsage"),
        memUsage: averageSummaryValue(history, "memUsage"),
        ioUsage: averageSummaryValue(history, "ioUsage"),
        sysUsage: averageSummaryValue(history, "sysUsage"),
        okCount: latest.okCount || 0,
        warningCount: latest.warningCount || 0,
        lastUpdated: history[history.length - 1]?.time || ""
      };
    }

    function peakSummary(history) {
      const latest = history[history.length - 1]?.summary || {};
      return {
        sensorCount: latest.sensorCount || 0,
        maxTemperature: maxSummaryValue(history, "maxTemperature"),
        averageFanRpm: maxSummaryValue(history, "averageFanRpm"),
        maxFanRpm: maxSummaryValue(history, "maxFanRpm"),
        maxPerformance: maxSummaryValue(history, "maxPerformance"),
        powerWatts: maxSummaryValue(history, "powerWatts"),
        averageVoltage: maxSummaryValue(history, "averageVoltage"),
        totalCurrent: maxSummaryValue(history, "totalCurrent"),
        okCount: latest.okCount || 0,
        warningCount: latest.warningCount || 0
      };
    }

    function summaryValues(history, property) {
      return history
        .map((row) => numericOrNull(row.summary?.[property] ?? row[property]))
        .filter((value) => value !== null);
    }

    function averageSummaryValue(history, property) {
      const values = summaryValues(history, property);
      if (values.length === 0) {
        return null;
      }

      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function maxSummaryValue(history, property) {
      const values = summaryValues(history, property);
      return values.length === 0 ? null : Math.max(...values);
    }

    function minSummaryValue(history, property) {
      const values = summaryValues(history, property);
      return values.length === 0 ? null : Math.min(...values);
    }

    function radarValues(summary) {
      const healthRatio = summary.sensorCount > 0 ? ((summary.okCount || 0) / summary.sensorCount) * 100 : 0;
      const coverage = Math.min(100, (summary.sensorCount || 0) / 2);
      return [
        clamp(summary.maxTemperature || 0, 0, 100),
        normalize(summary.averageFanRpm, 0, Math.max(3600, summary.maxFanRpm || 0)),
        clamp(summary.maxPerformance || 0, 0, 100),
        normalize(summary.powerWatts, 0, 500),
        normalize(summary.averageVoltage, 0, 240),
        normalize(summary.totalCurrent, 0, 5),
        healthRatio,
        coverage
      ];
    }

    function emptySummary() {
      return {
        sensorCount: 0,
        temperatureCount: 0,
        fanCount: 0,
        performanceCount: 0,
        electricalCount: 0,
        voltageCount: 0,
        currentCount: 0,
        okCount: 0,
        warningCount: 0,
        lastUpdated: ""
      };
    }

    function emptyCurrent() {
      return {
        temperatures: [],
        fans: [],
        power: [],
        performance: [],
        electrical: [],
        allNumeric: [],
        statusSensors: [],
        health: []
      };
    }

    function numericOrNull(value) {
      const n = Number(value);
      return Number.isFinite(n) ? n : null;
    }

    function formatDateTime(time) {
      const date = new Date(time);
      if (Number.isNaN(date.getTime())) {
        return "";
      }

      return new Intl.DateTimeFormat(document.documentElement.lang || undefined, {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      }).format(date);
    }

    function toLocalInputValue(time) {
      const date = new Date(time);
      if (Number.isNaN(date.getTime())) {
        return "";
      }

      return [
        date.getFullYear(),
        "-",
        pad2(date.getMonth() + 1),
        "-",
        pad2(date.getDate()),
        "T",
        pad2(date.getHours()),
        ":",
        pad2(date.getMinutes())
      ].join("");
    }

    function pad2(value) {
      return String(value).padStart(2, "0");
    }

    function dashboardTooltip(options) {
      return Object.assign({
        renderMode: "html",
        appendToBody: true,
        confine: true,
        className: "dashboard-tooltip",
        extraCssText: [
          "z-index:999999",
          "max-width:min(380px, calc(100vw - 24px))",
          "white-space:normal",
          "word-break:break-word",
          "overflow-wrap:anywhere",
          "line-height:1.45"
        ].join(";")
      }, options || {});
    }

    function clamp(value, min, max) {
      const n = Number(value);
      if (Number.isNaN(n)) {
        return min;
      }

      return Math.max(min, Math.min(max, n));
    }

    function normalize(value, min, max) {
      const n = Number(value);
      if (Number.isNaN(n) || max <= min) {
        return 0;
      }

      return clamp(((n - min) / (max - min)) * 100, 0, 100);
    }

    function escapeHtml(value) {
      return text(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function installHostWheelForwarding() {
      if (!window.chrome || !window.chrome.webview) {
        return;
      }

      window.addEventListener("wheel", (event) => {
        if (event.ctrlKey || event.metaKey) {
          return;
        }

        const deltaY = getHostWheelDeltaY(event);
        if (!Number.isFinite(deltaY) || Math.abs(deltaY) < 0.01) {
          return;
        }

        const shouldAnimateHostWheel = event.deltaMode !== WheelEvent.DOM_DELTA_PIXEL || Math.abs(event.deltaY) >= 80;
        event.preventDefault();
        event.stopPropagation();
        window.chrome.webview.postMessage({ type: "wheel", deltaY, animate: shouldAnimateHostWheel });
      }, { capture: true, passive: false });
    }

    function getHostWheelDeltaY(event) {
      if (event.deltaMode === WheelEvent.DOM_DELTA_PIXEL && Math.abs(event.deltaY) < 80) {
        return event.deltaY;
      }

      const sign = Math.sign(event.deltaY);
      if (sign === 0) {
        return 0;
      }

      const unit = event.deltaMode === WheelEvent.DOM_DELTA_LINE
        ? 3
        : event.deltaMode === WheelEvent.DOM_DELTA_PAGE
          ? 1
          : 100;
      const ticks = Math.min(60, Math.max(1, Math.round(Math.abs(event.deltaY) / unit)));
      return sign * ticks * 100;
    }

    initCharts();
    installHostWheelForwarding();
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.addEventListener("message", (event) => render(event.data));
      window.chrome.webview.postMessage({ type: "ready" });
    }
  </script>
</body>
</html>
